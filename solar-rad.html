<!-- HELIAS Lab: Multi-Species Radiation Simulator v2.5 -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>HELIAS Lab — Multi-Species Solar-Rad</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{ --accent:#1a52c8; --perv:#7c3aed; --cigs:#0d8a5e; --bg:#f4f6f9; --mono:'Space Mono',monospace; }
  body{ font-family:'DM Sans', sans-serif; background:var(--bg); margin:0; padding:20px; }
  .wrap{ max-width:1200px; margin:0 auto; background:#fff; padding:30px; border-radius:12px; }
  .orbit-box{ display:grid; grid-template-columns: 1.5fr 1fr; gap:20px; background:#f8fafc; padding:20px; border-radius:10px; margin-bottom:20px; border:1px solid #e2e8f0; }
  .ratio-bar-container{ height:25px; background:#eee; border-radius:15px; overflow:hidden; display:flex; margin-top:10px; }
  .ratio-item{ height:100%; display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff; font-weight:bold; }
  table{ width:100%; border-collapse:collapse; margin-top:15px; font-size:13px; }
  th, td{ border:1px solid #eee; padding:10px; text-align:center; }
  input, select{ width:80%; padding:5px; border-radius:4px; border:1px solid #ccc; font-family:var(--mono); }
  .chart-area{ display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px; }
  .mc-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-top:20px; }
  .mc{ background:var(--bg); padding:15px; border-radius:8px; text-align:center; }
</style>
</head>
<body>

<div class="wrap">
  <header style="margin-bottom:20px;">
    <h2 style="color:var(--accent); margin:0;">HELIAS Solar-Rad <span style="font-size:14px; font-weight:normal;">| Multi-Species Analysis</span></h2>
  </header>

  <div class="orbit-box">
    <div>
      <label><strong>Target Orbit Selection:</strong></label>
      <select id="orbit" onchange="runSim()" style="width:200px; padding:8px; margin-left:10px;">
        <option value="geo">GEO (정지궤도)</option>
        <option value="meo">MEO (중궤도)</option>
        <option value="leo">LEO (저궤도)</option>
        <option value="polar">Polar (극궤도)</option>
      </select>
      <p id="orbit-desc" style="font-size:13px; color:#666; margin-top:10px;"></p>
    </div>
    <div>
      <label style="font-size:12px; font-weight:bold;">Radiation Species Ratio:</label>
      <div class="ratio-bar-container" id="ratio-bar">
        <!-- JS가 비율 막대를 생성합니다 -->
      </div>
      <div style="display:flex; justify-content:space-between; font-size:11px; margin-top:5px;">
        <span>Proton (P+)</span><span>Electron (e-)</span><span>Others</span>
      </div>
    </div>
  </div>

  <div class="panel">
    <h4 style="margin:0 0 10px 0;">Layer Stack Configuration</h4>
    <table>
      <thead>
        <tr>
          <th>Layer</th>
          <th>Material</th>
          <th>Thick (nm)</th>
          <th>Density (g/cm³)</th>
          <th>Avg. Z</th>
          <th>Calculated NIEL</th>
        </tr>
      </thead>
      <tbody id="layer-table"></tbody>
    </table>
    <button onclick="addRow()" style="margin-top:10px; cursor:pointer;">+ Add Layer</button>
  </div>

  <div class="chart-area">
    <div class="mc"><canvas id="nielChart" style="height:250px;"></canvas></div>
    <div class="mc"><canvas id="eolChart" style="height:250px;"></canvas></div>
  </div>

  <div class="mc-grid">
    <div class="mc"><div style="font-size:11px;">Mixed-Species DDD</div><div id="m-ddd" style="font-size:18px; font-weight:bold;">--</div></div>
    <div class="mc"><div style="font-size:11px;">End-of-Life Eff.</div><div id="m-eol" style="font-size:18px; font-weight:bold;">--</div></div>
    <div class="mc"><div style="font-size:11px;">Dominant Species</div><div id="m-main" style="font-size:18px; font-weight:bold; color:var(--perv);">--</div></div>
    <div class="mc"><div style="font-size:11px;">Reliability Grade</div><div id="m-grade" style="font-size:18px; font-weight:bold;">--</div></div>
  </div>
</div>

<script>
const ORBIT_ENV = {
  "geo": { p: 70, e: 25, o: 5, desc: "태양 고에너지 양성자가 지배적입니다.", fact: 5.2, main: "Proton" },
  "meo": { p: 10, e: 85, o: 5, desc: "반 알렌대의 고농도 전자가 지배적입니다.", fact: 9.1, main: "Electron" },
  "leo": { p: 80, e: 10, o: 10, desc: "SAA 지역의 양성자 충격이 주요인입니다.", fact: 1.2, main: "Proton" },
  "polar": { p: 90, e: 2, o: 8, desc: "태양 입자 이벤트 및 중이온 노출 위험이 있습니다.", fact: 2.5, main: "Proton/HI" }
};

let layers = [
  {name: "Cover Glass", t: 100000, d: 2.5, z: 10},
  {name: "ITO", t: 150, d: 7.1, z: 49},
  {name: "Perovskite", t: 500, d: 4.2, z: 43},
  {name: "CIGS", t: 2000, d: 5.7, z: 42},
  {name: "Molybdenum", t: 500, d: 10.2, z: 42}
];

let charts = {};

function runSim() {
  const oKey = document.getElementById('orbit').value;
  const env = ORBIT_ENV[oKey];
  
  // 1. 궤도 설명 및 비율 바 업데이트
  document.getElementById('orbit-desc').textContent = env.desc;
  const bar = document.getElementById('ratio-bar');
  bar.innerHTML = `
    <div class="ratio-item" style="width:${env.p}%; background:#ef4444;">${env.p}%</div>
    <div class="ratio-item" style="width:${env.e}%; background:#3b82f6;">${env.e}%</div>
    <div class="ratio-item" style="width:${env.o}%; background:#6b7280;">${env.o}%</div>
  `;

  // 2. 레이어별 혼합 손상 계산
  let totalDose = 0;
  const tbody = document.getElementById('layer-table');
  tbody.innerHTML = layers.map((l, i) => {
    // 양성자/전자 비율에 따른 가중치 NIEL 계산 (실제 물리 모델 근사)
    const pDmg = (Math.pow(l.z, 1.3) * l.d * env.p / 100);
    const eDmg = (Math.pow(l.z, 0.8) * l.d * env.e / 100);
    const mixedNiel = (pDmg + eDmg) * env.fact / 500;
    
    totalDose += mixedNiel * (l.t / 1000);
    return `<tr><td>${l.name}</td><td>Custom</td><td>${l.t}</td><td>${l.d}</td><td>${l.z}</td><td>${mixedNiel.toFixed(4)}</td></tr>`;
  }).join('');

  // 3. 메트릭 업데이트
  const rf = Math.max(0.65, 1 - (totalDose / 800));
  document.getElementById('m-ddd').textContent = totalDose.toFixed(0) + " DDD";
  document.getElementById('m-eol').textContent = (26.5 * rf).toFixed(1) + " %";
  document.getElementById('m-main').textContent = env.main;
  document.getElementById('m-grade').textContent = rf > 0.9 ? "A+" : rf > 0.8 ? "A" : "B";

  updateCharts(rf);
}

function updateCharts(rf) {
  const ctx1 = document.getElementById('nielChart').getContext('2d');
  if(charts.c1) charts.c1.destroy();
  charts.c1 = new Chart(ctx1, {
    type: 'bar',
    data: { labels: layers.map(l=>l.name), datasets: [{label: 'Layer Stress (Mixed)', data: layers.map(l=>(l.z * l.d)), backgroundColor: '#1a52c8'}] },
    options: { responsive:true, maintainAspectRatio:false, plugins: { title: {display:true, text:'Relative Displacement Stress'} } }
  });

  const ctx2 = document.getElementById('eolChart').getContext('2d');
  if(charts.c2) charts.c2.destroy();
  charts.c2 = new Chart(ctx2, {
    type: 'line',
    data: { labels: ['BOL', '5Y', '10Y', '15Y'], datasets: [{label: 'PCE Prediction', data: [26.5, 26.5*(1-(1-rf)*0.4), 26.5*(1-(1-rf)*0.75), 26.5*rf], borderColor: '#7c3aed'}] },
    options: { responsive:true, maintainAspectRatio:false, plugins: { title: {display:true, text:'EOL Efficiency Decay'} } }
  });
}

function addRow() {
  layers.push({name: "New Layer", t: 100, d: 5.0, z: 40});
  runSim();
}

window.onload = runSim;
</script>
</body>
</html>
